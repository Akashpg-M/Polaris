syntax = "proto3";
package polaris.spatial.v1;
option go_package = "github.com/Akashpg-M/polaris/v3.0/backend/api/proto/v1";

enum NodeType {
  NODE_TYPE_UNKNOWN = 0;
  NODE_TYPE_BIKE = 1;
  NODE_TYPE_AUTO = 2;
  NODE_TYPE_SEDAN = 3;
  NODE_TYPE_SUV = 4;
  NODE_TYPE_DRONE = 5;
  NODE_TYPE_ROBOT = 6;
  NODE_TYPE_STATIC_SENSOR = 7;
}

enum NodeStatus {
  NODE_STATUS_UNKNOWN = 0;
  NODE_STATUS_IDLE = 1;
  NODE_STATUS_EN_ROUTE = 2;
  NODE_STATUS_ACTIVE = 3;
  NODE_STATUS_MAINTENANCE = 4;
  NODE_STATUS_OFFLINE = 5;
}

message SpatialObject {
  string id = 1;
  string tenant_id = 2;
  NodeType type = 3;
  NodeStatus status = 4;
  double lat = 5;
  double lon = 6;
  double velocity_mps = 7; 
  double heading_deg = 8;  
  int32 energy_percent = 9; // Generates as .EnergyPercent in Go
  int64 timestamp = 10;     // Generates as .Timestamp in Go (Unix Milliseconds/Seconds)
}